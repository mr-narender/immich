name: Auto Release

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      spk_version: ${{ steps.check.outputs.spk_version }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - name: Detect latest Immich release
        id: check
        run: |
          python3 - << 'PYEOF'
          import urllib.request, urllib.error, json, os

          headers = {
              'Accept': 'application/vnd.github.v3+json',
              'User-Agent': 'github-actions-immich-spk',
          }
          token = os.environ.get('GITHUB_TOKEN', '')
          if token:
              headers['Authorization'] = 'token ' + token

          req = urllib.request.Request(
              'https://api.github.com/repos/immich-app/immich/releases/latest',
              headers=headers,
          )
          with urllib.request.urlopen(req) as r:
              data = json.loads(r.read())

          version = data['tag_name'].lstrip('v')
          spk_version = version + '-1'

          exist_req = urllib.request.Request(
              'https://api.github.com/repos/mr-narender/immich/releases/tags/v' + version,
              headers=headers,
          )
          try:
              with urllib.request.urlopen(exist_req) as r:
                  r.read()
              should_release = 'false'
              print('Release v' + version + ' already published — skipping')
          except urllib.error.HTTPError as e:
              if e.code == 404:
                  should_release = 'true'
                  print('New Immich v' + version + ' — will build SPK')
              else:
                  raise

          out = os.environ['GITHUB_OUTPUT']
          with open(out, 'a') as f:
              f.write('version=' + version + '\n')
              f.write('spk_version=' + spk_version + '\n')
              f.write('should_release=' + should_release + '\n')
          PYEOF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: detect
    if: needs.detect.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            node_arch: x64
          - arch: arm64
            runner: ubuntu-24.04-arm
            node_arch: arm64
    runs-on: ${{ matrix.runner }}
    env:
      VERSION: ${{ needs.detect.outputs.version }}
      SPK_VERSION: ${{ needs.detect.outputs.spk_version }}
      ARCH: ${{ matrix.arch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clone Immich source
        run: |
          git clone --depth 1 --branch "v${VERSION}" \
            https://github.com/immich-app/immich.git /tmp/immich-src

      - name: Detect Node version
        id: node_ver
        run: |
          NODE_VER=24
          if [ -f /tmp/immich-src/.nvmrc ]; then
            NODE_VER=$(cat /tmp/immich-src/.nvmrc | tr -d 'v\n ')
          fi
          echo "node_version=${NODE_VER}" >> "$GITHUB_OUTPUT"
          echo "Detected Node version: ${NODE_VER}"

      - name: Setup Node.js (build)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node_ver.outputs.node_version }}

      - name: Build server and web
        working-directory: /tmp/immich-src
        run: |
          corepack enable
          corepack prepare --activate
          pnpm install --frozen-lockfile
          pnpm --filter @immich/sdk build
          pnpm --filter @immich/plugin-sdk build || true
          pnpm --filter immich build
          pnpm --filter immich-web build \
            || pnpm --filter '@immich/web' build \
            || true
          rm -rf /tmp/server-deploy
          pnpm --filter immich deploy --prod --legacy /tmp/server-deploy \
            || pnpm --filter immich deploy --prod /tmp/server-deploy

      - name: Prune non-current-arch prebuilds
        run: |
          find /tmp/server-deploy -name "*.node" | while read f; do
            base=$(basename "$f")
            drop=0
            echo "$base" | grep -qE '(darwin|win32|linuxmusl)' && drop=1
            [ "$ARCH" = "x86_64" ] && echo "$base" | grep -qE '(arm64|aarch64)' && drop=1
            [ "$ARCH" = "arm64"  ] && echo "$base" | grep -qE '(x64|ia32|x86_64)' && drop=1
            if [ "$drop" = "1" ]; then
              echo "  prune: $f"
              rm -f "$f"
            fi
          done

      - name: Verify sharp
        working-directory: /tmp/server-deploy
        run: node -e "require('sharp'); console.log('SHARP_OK')"

      - name: Package server and web tarballs
        run: |
          mkdir -p /tmp/build-out
          COPYFILE_DISABLE=1 tar czf "/tmp/build-out/server-linux-${ARCH}.tar.gz" \
            -C /tmp/server-deploy .
          WEB_BUILD=""
          for d in \
            /tmp/immich-src/app/web/build \
            /tmp/immich-src/web/build \
            /tmp/immich-src/apps/web/build; do
            if [ -d "$d" ]; then
              WEB_BUILD="$d"
              break
            fi
          done
          if [ -z "$WEB_BUILD" ]; then
            WEB_BUILD=$(find /tmp/immich-src -name "index.html" \
              -path "*/build/*" -print -quit | xargs dirname 2>/dev/null || true)
          fi
          [ -z "$WEB_BUILD" ] && { echo "FATAL: web build output not found"; exit 1; }
          echo "Web build dir: $WEB_BUILD"
          COPYFILE_DISABLE=1 tar czf "/tmp/build-out/web-build.tar.gz" -C "$WEB_BUILD" .

      - name: Download Node.js runtime
        run: |
          mkdir -p /tmp/node-out
          python3 - << 'PYEOF'
          import urllib.request, json, os

          node_arch = os.environ['NODE_ARCH']
          linux_arch = 'arm64' if node_arch == 'arm64' else 'x64'

          import sys

          with urllib.request.urlopen('https://nodejs.org/dist/index.json') as r:
              releases = json.loads(r.read())

          v24 = next((rel for rel in releases if rel['version'].startswith('v24.')), None)
          if v24 is None:
              sys.exit('No v24.x Node.js release found in nodejs.org index')
          ver = v24['version']
          filename = 'node-' + ver + '-linux-' + linux_arch + '.tar.xz'
          url = 'https://nodejs.org/dist/' + ver + '/' + filename

          print('Downloading ' + url)
          out_path = '/tmp/node-out/' + filename
          with urllib.request.urlopen(url) as resp, open(out_path, 'wb') as fout:
              fout.write(resp.read())

          with open(os.environ['GITHUB_ENV'], 'a') as envf:
              envf.write('NODE_FILENAME=' + filename + '\n')

          print('Saved: ' + filename + ' (' + str(os.path.getsize(out_path)) + ' bytes)')
          PYEOF
        env:
          NODE_ARCH: ${{ matrix.node_arch }}

      - name: Build Redis 7.2.7 (static musl)
        run: |
          mkdir -p /tmp/redis-out/bin
          docker run --rm \
            --hostname ci-build \
            -v /tmp/redis-out/bin:/out \
            alpine:3.19 \
            sh -c '
              apk add --no-cache make gcc musl-dev linux-headers wget tar &&
              wget -q -O /tmp/redis.tar.gz \
                "https://github.com/redis/redis/archive/refs/tags/7.2.7.tar.gz" &&
              mkdir /tmp/redis-src &&
              tar xzf /tmp/redis.tar.gz -C /tmp/redis-src --strip-components=1 &&
              cd /tmp/redis-src &&
              make -j$(nproc) \
                LDFLAGS="-static" \
                MALLOC=libc \
                REDIS_CFLAGS= \
                REDIS_LDFLAGS= &&
              cp src/redis-server src/redis-cli /out/
            '
          file /tmp/redis-out/bin/redis-server
          mkdir -p /tmp/redis-out/bin
          COPYFILE_DISABLE=1 tar czf "/tmp/redis-out/redis-${ARCH}.tar.gz" \
            -C /tmp/redis-out bin/
          echo "Redis tarball: $(du -h /tmp/redis-out/redis-${ARCH}.tar.gz | cut -f1)"

      - name: Cache PostgreSQL + pgvector
        id: pg_cache
        uses: actions/cache@v4
        with:
          path: /tmp/pg-out
          key: postgres-14-pgvector-0.8.0-v3-${{ matrix.arch }}

      - name: Build PostgreSQL 14 + pgvector (x86_64 / centos:7)
        if: steps.pg_cache.outputs.cache-hit != 'true' && matrix.arch == 'x86_64'
        run: |
          mkdir -p /tmp/pg-out
          cat > /tmp/Dockerfile.pg << 'DOCKEREOF'
          FROM centos:7
          RUN sed -i 's/mirrorlist=/#mirrorlist=/g' /etc/yum.repos.d/CentOS-*.repo && \
              sed -i 's|#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g' \
                  /etc/yum.repos.d/CentOS-*.repo && \
              yum -y install \
                  https://download.postgresql.org/pub/repos/yum/reporpms/EL-7-x86_64/pgdg-redhat-repo-latest.noarch.rpm && \
              yum -y --disablerepo='*' --enablerepo='base,extras,updates,pgdg14,pgdg-common' \
                  install postgresql14-server gcc make git yum-utils && \
              mkdir -p /tmp/pgdevel && \
              yumdownloader --disablerepo='*' --enablerepo='pgdg14,pgdg-common' \
                  --destdir=/tmp/pgdevel postgresql14-devel && \
              cd / && rpm2cpio /tmp/pgdevel/postgresql14-devel*.rpm | cpio -idmv && \
              yum clean all
          RUN git clone --branch v0.8.0 --depth 1 \
                  https://github.com/pgvector/pgvector.git /tmp/pgvector && \
              cd /tmp/pgvector && \
              make USE_PGXS=1 PG_CONFIG=/usr/pgsql-14/bin/pg_config with_llvm=no && \
              make USE_PGXS=1 PG_CONFIG=/usr/pgsql-14/bin/pg_config with_llvm=no install
          RUN mkdir -p /out && \
              tar czf /out/postgres-x86_64.tar.gz \
                  -C /usr/pgsql-14 bin/ lib/ share/ include/
          DOCKEREOF
          docker build --platform linux/amd64 -f /tmp/Dockerfile.pg -t pg-builder-x86 /tmp
          docker create --name pg-ext-x86 pg-builder-x86
          docker cp pg-ext-x86:/out/postgres-x86_64.tar.gz /tmp/pg-out/
          docker rm pg-ext-x86
          echo "PG tarball: $(du -h /tmp/pg-out/postgres-x86_64.tar.gz | cut -f1)"

      - name: Build PostgreSQL 14 + pgvector (arm64 / almalinux:8)
        if: steps.pg_cache.outputs.cache-hit != 'true' && matrix.arch == 'arm64'
        run: |
          mkdir -p /tmp/pg-out
          cat > /tmp/Dockerfile.pg << 'DOCKEREOF'
          FROM arm64v8/almalinux:8
          RUN dnf -y install \
                  https://download.postgresql.org/pub/repos/yum/reporpms/EL-8-aarch64/pgdg-redhat-repo-latest.noarch.rpm && \
              dnf -y module disable postgresql && \
              dnf -y install postgresql14-server gcc make git yum-utils && \
              mkdir -p /tmp/pgdevel && \
              yumdownloader --disablerepo='*' --enablerepo='pgdg14,pgdg-common' \
                  --destdir=/tmp/pgdevel postgresql14-devel && \
              rpm -i --nodeps /tmp/pgdevel/postgresql14-devel*.rpm && \
              dnf clean all
          RUN git clone --branch v0.8.0 --depth 1 \
                  https://github.com/pgvector/pgvector.git /tmp/pgvector && \
              cd /tmp/pgvector && \
              make USE_PGXS=1 PG_CONFIG=/usr/pgsql-14/bin/pg_config with_llvm=no && \
              make USE_PGXS=1 PG_CONFIG=/usr/pgsql-14/bin/pg_config with_llvm=no install
          RUN mkdir -p /out && \
              tar czf /out/postgres-arm64.tar.gz \
                  -C /usr/pgsql-14 bin/ lib/ share/ include/
          DOCKEREOF
          docker build --platform linux/arm64 -f /tmp/Dockerfile.pg -t pg-builder-arm64 /tmp
          docker create --name pg-ext-arm64 pg-builder-arm64
          docker cp pg-ext-arm64:/out/postgres-arm64.tar.gz /tmp/pg-out/
          docker rm pg-ext-arm64
          echo "PG tarball: $(du -h /tmp/pg-out/postgres-arm64.tar.gz | cut -f1)"

      - name: Extract geodata
        run: |
          mkdir -p /tmp/geodata-out
          GEODATA=$(find /tmp/immich-src -name "cities500.txt" -print -quit 2>/dev/null)
          if [ -z "$GEODATA" ]; then
            GEODATA=$(find /tmp/immich-src/server -name "*.txt" -print -quit 2>/dev/null)
          fi
          if [ -z "$GEODATA" ]; then
            echo "WARN: cities500.txt not found; continuing with empty geodata-out"
          else
            GEODATA_DIR=$(dirname "$GEODATA")
            echo "Geodata dir: $GEODATA_DIR"
            cp "$GEODATA_DIR"/* /tmp/geodata-out/
            ls -lh /tmp/geodata-out/
          fi

      - name: Assemble SPK
        run: |
          REPO="$(pwd)" \
          VERSION="${SPK_VERSION}" \
          ARCH="${ARCH}" \
          POSTGRES_TAR="/tmp/pg-out/postgres-${ARCH}.tar.gz" \
          REDIS_TAR="/tmp/redis-out/redis-${ARCH}.tar.gz" \
          NODE_TAR="/tmp/node-out/${NODE_FILENAME}" \
          GEODATA_DIR="/tmp/geodata-out" \
          SERVER_TAR="/tmp/build-out/server-linux-${ARCH}.tar.gz" \
          WEB_TAR="/tmp/build-out/web-build.tar.gz" \
          OUT_SPK="$(pwd)/immich-${ARCH}-${SPK_VERSION}.spk" \
          bash syno/assemble-standalone.sh

      - name: Upload SPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: spk-${{ matrix.arch }}
          path: immich-${{ matrix.arch }}-${{ needs.detect.outputs.spk_version }}.spk
          if-no-files-found: error

  release:
    needs: [detect, build]
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.detect.outputs.version }}
      SPK_VERSION: ${{ needs.detect.outputs.spk_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download SPK artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Locate SPK files
        run: |
          X86_SPK=$(find artifacts/ -name "immich-x86_64-*.spk" | head -1)
          ARM64_SPK=$(find artifacts/ -name "immich-arm64-*.spk" | head -1)
          [ -z "$X86_SPK"   ] && { echo "FATAL: x86_64 SPK artifact not found"; exit 1; }
          [ -z "$ARM64_SPK" ] && { echo "FATAL: arm64 SPK artifact not found";  exit 1; }
          echo "X86_SPK=${X86_SPK}"                         >> "$GITHUB_ENV"
          echo "ARM64_SPK=${ARM64_SPK}"                     >> "$GITHUB_ENV"
          echo "X86_SPK_NAME=$(basename "${X86_SPK}")"       >> "$GITHUB_ENV"
          echo "ARM64_SPK_NAME=$(basename "${ARM64_SPK}")"   >> "$GITHUB_ENV"

      - name: Update packages.json
        run: |
          python3 - << 'PYEOF'
          import json, os

          version      = os.environ['VERSION']
          spk_version  = os.environ['SPK_VERSION']
          x86_name     = os.environ['X86_SPK_NAME']
          arm64_name   = os.environ['ARM64_SPK_NAME']
          repo         = 'mr-narender/immich'

          base_url = 'https://github.com/' + repo + '/releases/download/v' + version + '/'

          feed = {
              'packages': [{
                  'id': 'immich',
                  'package': 'immich',
                  'version': spk_version,
                  'dname': 'Immich',
                  'desc': 'High-performance self-hosted photo and video management solution.',
                  'price': 0,
                  'download_count': 0,
                  'link': base_url + x86_name,
                  'qinst': True,
                  'qstart': True,
                  'qupgrade': True,
                  'deppkgs': '',
                  'conflictpkgs': '',
                  'start': True,
                  'adminurl': '/',
                  'adminprotocol': 'http',
                  'adminport': '2284',
                  'maintainer': 'SLR Software Inc.',
                  'distributor': 'mr-narender',
                  'distributor_url': 'https://github.com/' + repo,
                  'changelog': 'Immich v' + version,
              }]
          }

          with open('packages.json', 'w') as f:
              json.dump(feed, f, indent=2)
              f.write('\n')

          print('packages.json updated: version=' + version)
          print('  x86_64 link: ' + base_url + x86_name)
          PYEOF

      - name: Update syno/INFO version
        run: |
          python3 - << 'PYEOF'
          import re, os

          spk_version = os.environ['SPK_VERSION']

          with open('syno/INFO') as f:
              content = f.read()

          content = re.sub(r'^version=.*$', 'version=' + spk_version,
                           content, flags=re.MULTILINE)

          with open('syno/INFO', 'w') as f:
              f.write(content)

          print('syno/INFO updated: version=' + spk_version)
          PYEOF

      - name: Commit and push metadata
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || git stash
          git pull --rebase origin main
          git stash list | grep -q 'stash@{0}' && git stash pop || true
          git add packages.json syno/INFO
          git diff --staged --quiet || \
            git commit -m "chore: bump to Immich v${VERSION} (SPK ${SPK_VERSION})"
          git push origin main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.detect.outputs.version }}
          name: Immich ${{ needs.detect.outputs.version }} for Synology
          body: |
            ## Immich ${{ needs.detect.outputs.version }} for Synology DSM

            Built from scratch — no base SPK dependency.

            **Bundled components:**
            - Node.js v24 (latest patch)
            - PostgreSQL 14 + pgvector 0.8.0
            - Redis 7.2.7 (static musl binary)

            ### Downloads

            | Architecture | File |
            |---|---|
            | x86\_64 (Intel/AMD) | `${{ env.X86_SPK_NAME }}` |
            | arm64 | `${{ env.ARM64_SPK_NAME }}` |

            ### Install
            DSM → Package Center → Manual Install → select SPK → Next.

            ### Package feed (auto-update)
            Package Center → Settings → Package Sources → Add:
            ```
            https://raw.githubusercontent.com/mr-narender/immich/main/packages.json
            ```
          files: |
            ${{ env.X86_SPK }}
            ${{ env.ARM64_SPK }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
